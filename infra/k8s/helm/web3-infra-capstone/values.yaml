# Kubernetes namespace for all resources
namespace: web3-infra

# Container image references
images:
  anvil: "815591045885.dkr.ecr.eu-west-2.amazonaws.com/web3-infra-capstone-anvil:latest"
  agent: "<ECR_AGENT_IMAGE>"          # Price fetcher service image
  monitor: "<ECR_MONITOR_IMAGE>"      # Event indexer service image
  prometheus: "prom/prometheus:latest" # Metrics collection
  grafana: "grafana/grafana:latest"   # Metrics visualization
  postgres: "postgres:16"             # Price storage database

# Agent service configuration (fetches prices, submits to smart contract)
agent:
  rpcUrl: "http://anvil:8545"
  chainId: "31337"
  privateKey: "<REPLACE_WITH_DEPLOYER_PRIVATE_KEY>"
  oracleAddress: "<REPLACE_WITH_ORACLE_CONTRACT_ADDRESS>"
  priceApiUrl: "https://api.coinbase.com/v2/prices/ETH-USD/spot"
  priceScale: "100"
  rateLimitRps: "0.2"
  minUpdateInterval: "15s"
  priceChangeThreshold: "0.01"
  queueFile: "/tmp/agent-queue.jsonl"
  retryMax: "5"             # Max retries for failed submissions
  retryBaseDelay: "2s"      # Base delay before exponential backoff

# Monitor service configuration (indexes blockchain events, stores prices)
monitor:
  rpcUrl: "http://anvil:8545"
  oracleAddress: "<REPLACE_WITH_ORACLE_CONTRACT_ADDRESS>"
  dbUrl: "postgres://<POSTGRES_USER>:<POSTGRES_PASSWORD>@postgres:5432/oracle?sslmode=disable"
  baseSymbol: "ETH"         # Base asset symbol
  quoteSymbol: "USD"        # Quote asset symbol
  confirmations: "3"        # Wait for N blocks before indexing
  reorgDepth: "5"           # Handle up to N block reorg depth
  pollInterval: "10s"       # Check for new events every N seconds

# Grafana dashboard login credentials
grafana:
  adminUser: "admin"
  adminPassword: "admin"

# Service exposure type (ClusterIP = internal only)
service:
  type: ClusterIP
