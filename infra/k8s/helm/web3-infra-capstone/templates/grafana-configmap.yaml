apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.namespace }}
data:
  oracle-dashboard.json: |-
    {
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "type": "stat",
          "title": "Agent Update Failures (rate)",
          "targets": [
            {
              "expr": "rate(agent_price_update_failures_total[5m])",
              "legendFormat": "failures"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Monitor Lag (seconds)",
          "targets": [
            {
              "expr": "monitor_ingest_lag_seconds",
              "legendFormat": "lag"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Prices Ingested",
          "targets": [
            {
              "expr": "rate(monitor_prices_ingested_total[5m])",
              "legendFormat": "ingest/s"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "title": "Oracle Stack Overview",
      "version": 1
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: {{ .Values.namespace }}
data:
  dashboards.yaml: |-
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
  namespace: {{ .Values.namespace }}
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
