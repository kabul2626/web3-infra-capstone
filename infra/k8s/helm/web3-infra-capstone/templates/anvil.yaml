apiVersion: apps/v1
kind: Deployment
metadata:
  name: anvil
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anvil
  template:
    metadata:
      labels:
        app: anvil
    spec:
      containers:
        - name: anvil
          image: {{ .Values.images.anvil }}
          ports:
            - containerPort: 8545
          command: ["anvil"]
          args: ["--host", "0.0.0.0", "--port", "8545"]
---
apiVersion: v1
kind: Service
metadata:
  name: anvil
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: anvil
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
  type: {{ .Values.service.type }}
