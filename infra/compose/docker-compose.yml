version: "3.9"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545
    ports:
      - "8545:8545"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"

  agent:
    build: ../../services/agent
    environment:
      RPC_URL: http://anvil:8545
      CHAIN_ID: 31337
      PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      ORACLE_ADDRESS: 0x5FbDB2315678afecb367f032d93F642f64180aa3
      PRICE_API_URL: "https://api.coincap.io/v2/assets/ethereum"
      PRICE_SCALE: 100
      RATE_LIMIT_RPS: 0.2
      MIN_UPDATE_INTERVAL: 15s
      PRICE_CHANGE_THRESHOLD: 0.01
      QUEUE_FILE: /tmp/agent-queue.jsonl
      RETRY_MAX: 5
      RETRY_BASE_DELAY: 2s
    ports:
      - "8081:8081"
    depends_on:
      - anvil

  monitor:
    build: ../../services/monitor
    environment:
      RPC_URL: http://anvil:8545
      ORACLE_ADDRESS: 0x5FbDB2315678afecb367f032d93F642f64180aa3
      DB_URL: postgres://postgres:postgres@postgres:5432/oracle?sslmode=disable
      BASE_SYMBOL: ETH
      QUOTE_SYMBOL: USD
      CONFIRMATIONS: 3
      REORG_DEPTH: 5
      POLL_INTERVAL: 10s
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - anvil

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - agent
      - monitor

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
