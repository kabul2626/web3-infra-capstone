# Docker Compose configuration for local development of the web3 price oracle.
# Includes Anvil (local Ethereum), PostgreSQL, Agent (price fetcher), Monitor (event indexer),
# Prometheus (metrics collection), and Grafana (visualization).
version: "3.9"

services:
  # Anvil: local Ethereum development chain
  anvil:
    build: ./web3-infra-capstone/infra
    container_name: anvil
    ports:
      - "8545:8545"  # JSON-RPC endpoint

  # PostgreSQL: stores ingested price events from the blockchain
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"  # Database connection port

  # Agent: fetches external prices and submits updates to the smart contract
  agent:
    build:
      context: ./web3-infra-capstone/services/agent
    container_name: oracle-agent
    depends_on:
      - anvil  # Requires running blockchain
    environment:
      RPC_URL: http://anvil:8545
      CHAIN_ID: 31337
      PRIVATE_KEY: ${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      ORACLE_ADDRESS: ${ORACLE_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      PRICE_API_URL: "https://api.coincap.io/v2/assets/ethereum"
      PRICE_SCALE: 100
      RATE_LIMIT_RPS: 0.2
      MIN_UPDATE_INTERVAL: 15s
      PRICE_CHANGE_THRESHOLD: 0.01
      QUEUE_FILE: /tmp/agent-queue.jsonl
      RETRY_MAX: 5
      RETRY_BASE_DELAY: 2s
    ports:
      - "8081:8081"

  # Monitor: indexes blockchain events and stores prices in database
  monitor:
    build:
      context: ./web3-infra-capstone/services/monitor
    container_name: oracle-monitor
    depends_on:
      - anvil      # Requires blockchain for event logs
      - postgres   # Requires database for storage
    environment:
      RPC_URL: http://anvil:8545
      ORACLE_ADDRESS: ${ORACLE_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/oracle?sslmode=disable
      BASE_SYMBOL: ETH
      QUOTE_SYMBOL: USD
      CONFIRMATIONS: 3
      REORG_DEPTH: 5
      POLL_INTERVAL: 10s
    ports:
      - "8082:8082"

  # Prometheus: collects metrics from Agent and Monitor services
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - agent    # Scrapes /metrics endpoint
      - monitor  # Scrapes /metrics endpoint
    volumes:
      - ./web3-infra-capstone/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./web3-infra-capstone/infra/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "9090:9090"

  # Grafana: visualizes metrics from Prometheus
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus  # Data source for dashboards
    ports:
      - "3000:3000"