name: deploy-services

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region eu-west-2 --name web3-infra-capstone

      - name: Deploy via Helm
        working-directory: infra/k8s/helm/web3-infra-capstone
        run: |
          helm upgrade --install web3-infra-capstone . \
            --namespace web3-infra --create-namespace \
            --set images.anvil=${{ secrets.ECR_ANVIL_IMAGE }}:${{ inputs.image_tag }} \
            --set images.agent=${{ secrets.ECR_AGENT_IMAGE }}:${{ inputs.image_tag }} \
            --set images.monitor=${{ secrets.ECR_MONITOR_IMAGE }}:${{ inputs.image_tag }}
