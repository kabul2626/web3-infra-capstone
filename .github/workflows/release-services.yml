# Build and push service images to container registry on release
name: release-services

# Trigger on manual dispatch or version tag push
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: services/agent
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-agent:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-agent:latest

      - name: Build and push monitor
        uses: docker/build-push-action@v6
        with:
          context: services/monitor
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-monitor:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-monitor:latest
